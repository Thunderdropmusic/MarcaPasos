name: Release Automatico

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear Release
        uses: softprops/action-gh-release@v1
        with:
          name: MarcaPasos ${{ github.ref_name }}
          files: |
            src/MarcaPasos ${{ github.ref_name }}.pde
            src/MarcaPasos ${{ github.ref_name }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}